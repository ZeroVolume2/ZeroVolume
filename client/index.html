<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Live Campus Hub</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Live Campus Hub</h1>
        <p>Welcome back, Student</p>
    </header>

    <main>

    <!-- Login Section -->
    <section id="login-section">
        <h2>Login</h2>
        <p>Enter your details to continue.</p>

        <input type="text" id="name-input" placeholder="Your name">
        <input type="email" id="email-input" placeholder="University email address">

        <button type="button" onclick="login()">Login</button>

        <p id="login-message"></p>
    </section>

    <!-- App Section (hidden until login) -->
    <section id="app-section" style="display:none;">

        <div class="app-header">
            <h2 id="welcome-message">Welcome!</h2>
            <button type="button" onclick="logout()">Logout</button>
        </div>

        <!-- Points Section -->
        <section id="points-section">
            <h2>Your Points</h2>
            <p id="points-display">Points: 0</p>
        </section>

        <!-- Check-in Section -->
        <section id="checkin-section">
            <h2>Check In</h2>
            <button type="button" onclick="checkIn('library')">Check In at Library</button>
            <button type="button" onclick="checkIn('gym')">Check In at Gym</button>
            <button type="button" onclick="checkIn('student_union')">Check In at Student Union</button>
            <p id="checkin-message"></p>
        </section>

        <!-- Events Section -->
        <section id="events-section">
            <h2>Upcoming Events</h2>
            <ul id="events-list">
                <li>Library Study Workshop - 2PM</li>
                <li>Basketball Training - 5PM</li>
                <li>Music Society Meeting - 6PM</li>
            </ul>
        </section>

    </section>

</main>

    <script src="app.js"></script>
</body>
</html>
